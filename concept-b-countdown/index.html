<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <script src="mraid.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg"></div>

  <div class="container" id="heroContainer">
    <header class="header">
      <div class="brand-logo" aria-label="Ligabet logo">

      </div>
      <div class="live-pulse"><span class="live-dot"></span>LIVE MATCHES</div>
    </header>

    <main class="hero-card" id="heroCard">
      <div class="match-title" id="matchTitle">Loading match...</div>

      <div class="teams">
        <div class="team">
          <img id="homeLogo" class="team-logo" alt="Home team logo">
          <div class="team-name" id="homeName">HOME</div>
        </div>
        <div class="vs">VS</div>
        <div class="team">
          <img id="awayLogo" class="team-logo" alt="Away team logo">
          <div class="team-name" id="awayName">AWAY</div>
        </div>
      </div>

      <div class="kickoff-label" id="kickoffLabel">KICKOFF IN</div>
      <div class="hero-countdown" id="heroCountdown">--:--:--</div>
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>

      <div class="odds-row" id="oddsRow">
        <span class="odd" id="oddHome">--</span>
        <span class="odd" id="oddDraw">--</span>
        <span class="odd" id="oddAway">--</span>
      </div>
    </main>

    <button class="cta" id="cta">BET NOW →</button>

    <div class="disclaimer">18+ | Gamble responsibly</div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
